<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vermis Mini — Simulateur de Combat</title>
<style>
/* ============= THEME GRIMDARK ============= */
:root{
  --bg:#161412; --bg2:#1f1c19; --bg3:#2a2622; --border:#3a342d;
  --text:#d8cfc2; --muted:#8a7f6f; --accent:#b8412f; --accent2:#c98a3b;
  --good:#5e8a3e; --bad:#a13320; --warn:#c98a3b;
  --red-die:#c93b2b; --shadow:rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{
  margin:0;padding:14px;font:13px/1.5 'Iowan Old Style','Palatino Linotype',serif;
  background:var(--bg);color:var(--text);min-height:100vh;
}
h1{font-size:22px;margin:0 0 4px;color:var(--accent2);letter-spacing:.5px}
h2{font-size:16px;margin:0 0 8px;color:var(--accent2);border-bottom:1px solid var(--border);padding-bottom:4px}
h3{font-size:14px;margin:8px 0 4px;color:var(--text)}
.subtitle{color:var(--muted);font-size:12px;font-style:italic;margin-bottom:12px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:10px}
.grid{display:grid;gap:10px}
.grid-2{grid-template-columns:1fr 1fr}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
label{color:var(--muted);font-size:12px}
input,select,button,textarea{
  background:var(--bg3);color:var(--text);border:1px solid var(--border);
  padding:4px 6px;border-radius:3px;font:inherit;font-size:12px;
}
input[type="number"]{width:60px}
input[type="text"]{width:120px}
button{cursor:pointer;background:var(--bg3);transition:background .15s}
button:hover{background:var(--border)}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button.primary:hover{background:#d04e3a}
button.danger{background:var(--bad);color:#fff;border-color:var(--bad)}
button.small{padding:2px 6px;font-size:11px}
.team{padding:10px;border:1px solid var(--border);border-radius:4px;background:var(--bg2)}
.team.a{border-left:3px solid var(--accent)}
.team.b{border-left:3px solid var(--accent2)}
.combatant{
  background:var(--bg3);border:1px solid var(--border);border-radius:3px;
  padding:6px 8px;margin:4px 0;font-size:12px;
}
.combatant.dead{opacity:.4;text-decoration:line-through}
.combatant-header{display:flex;justify-content:space-between;align-items:center;gap:4px;cursor:pointer}
.combatant-name{flex:1;font-weight:600;color:var(--accent2)}
.combatant-summary{color:var(--muted);font-size:11px}
.combatant-detail{display:none;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.combatant.expanded .combatant-detail{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;font-size:11px}
.stat-grid .row{margin:0}
.stat-grid label{min-width:32px}
.actions{display:flex;gap:4px;justify-content:flex-end}
.results-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.stat-box{background:var(--bg3);padding:6px 8px;border-radius:3px;border:1px solid var(--border)}
.stat-box .v{font-size:18px;color:var(--accent2);font-weight:600}
.stat-box .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.bar{height:6px;background:var(--bg3);border-radius:2px;margin-top:2px;overflow:hidden}
.bar > div{height:100%;background:var(--accent2);transition:width .3s}
.bar.team-a > div{background:var(--accent)}
.bar.team-b > div{background:var(--accent2)}
.log{
  background:#0d0c0b;border:1px solid var(--border);border-radius:3px;
  padding:8px;max-height:300px;overflow:auto;font:11px/1.4 'Consolas',monospace;
  white-space:pre-wrap;
}
.log .l-attack{color:#c98a3b}
.log .l-damage{color:#c93b2b}
.log .l-heal{color:#5e8a3e}
.log .l-death{color:#a13320;font-weight:bold}
.log .l-info{color:#8a7f6f}
.log .l-round{color:#d8cfc2;font-weight:bold;border-top:1px solid var(--border);margin-top:4px;padding-top:4px}
.log .l-victory{color:#c98a3b;font-weight:bold;font-size:13px;margin-top:6px}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:4px 6px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:normal;text-transform:uppercase;font-size:10px;letter-spacing:.5px}
tr:hover td{background:var(--bg3)}
.dice{display:inline-flex;gap:2px;flex-wrap:wrap}
.die{
  display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;
  background:var(--bg3);border:1px solid var(--border);border-radius:2px;font-weight:600;font-size:11px;
}
.die.red{background:var(--red-die);color:#fff;border-color:var(--red-die)}
.die.success{outline:1px solid var(--good)}
.die.one{background:var(--accent2);color:#000}
.die.red.one{background:var(--accent);color:#fff}
.flex{display:flex;gap:6px;align-items:center}
.muted{color:var(--muted)}
.warn{color:var(--warn)}
.tag{display:inline-block;padding:1px 5px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:10px;margin-right:2px}
hr{border:none;border-top:1px solid var(--border);margin:8px 0}
details summary{cursor:pointer;color:var(--muted);font-size:12px;padding:4px 0}
details[open] summary{color:var(--text)}
.hidden{display:none}
.tooltip{position:relative;display:inline-block;cursor:help;color:var(--muted);border-bottom:1px dotted var(--muted)}
.tooltip:hover::after{
  content:attr(data-tip);position:absolute;bottom:100%;left:0;
  background:var(--bg);border:1px solid var(--border);padding:6px;border-radius:3px;
  width:260px;font-size:11px;color:var(--text);z-index:100;font-family:serif;
}
</style>
</head>
<body>

<h1>Vermis Mini — Simulateur de Combat</h1>
<div class="subtitle">v0.1 · Moteur fidèle aux règles canon v10 (pool de dés, dé rouge, bonus sur 1, END/Blessures, Push en Bet, Don/Expertise)</div>

<!-- ============= ÉQUIPES ============= -->
<div class="panel">
  <h2>Équipes</h2>
  <div class="grid grid-2">
    <div class="team a" id="teamA-panel">
      <h3 style="color:var(--accent)">⚔ Équipe A</h3>
      <div class="row">

        <select id="teamA-tier">
          <option value="1">1 · Vermine</option>

          <option value="3" selected>3 · Égal PJ</option>

          <option value="5">5 · Élite</option>
          <option value="6">6 · Boss</option>

        <button onclick="generateTeam('A')">⟳ Générer</button>
        <button class="small" onclick="clearTeam('A')">∅</button>
      </div>

      <button class="small" onclick="addCombatant('A')">+ ajouter combattant</button>
    </div>
    <div class="team b" id="teamB-panel">
      <h3 style="color:var(--accent2)">⚔ Équipe B</h3>
      <div class="row">
        <label>Taille</label>
        <input type="number" id="teamB-size" min="1" max="20" value="4">
        <label>Tier</label>
        <select id="teamB-tier">
          <option value="1">1 · Vermine</option>
          <option value="2">2 · Soldat</option>
          <option value="3" selected>3 · Égal PJ</option>
          <option value="4">4 · Vétéran</option>
          <option value="5">5 · Élite</option>
          <option value="6">6 · Boss</option>
        </select>
        <button onclick="generateTeam('B')">⟳ Générer</button>
        <button class="small" onclick="clearTeam('B')">∅</button>
      </div>
      <div id="teamB-list"></div>
      <button class="small" onclick="addCombatant('B')">+ ajouter combattant</button>
    </div>
  </div>
</div>

<!-- ============= PARAMÈTRES ============= -->
<div class="panel">
  <h2>Paramètres de combat</h2>
  <div class="row">
    <label>Rounds max</label>
    <input type="number" id="param-maxRounds" value="30" min="1" max="100">
    <label><input type="checkbox" id="param-shieldsActive"> Boucliers passifs <span class="tooltip" data-tip="Si coché : le bonus de bouclier s'ajoute toujours à la difficulté défensive (comme si Bloquer était auto). Sinon : ignoré (le combattant attaque au lieu de bloquer).">(?)</span></label>
    <label><input type="checkbox" id="param-surpriseA"> Surprise A</label>
    <label><input type="checkbox" id="param-surpriseB"> Surprise B</label>
    <label>Seed <input type="text" id="param-seed" placeholder="auto" style="width:80px"></label>
  </div>
  <div class="row">
    <label>Nom du scénario</label>
    <input type="text" id="param-scenario" placeholder="ex: 4 soldats vs 1 boss" style="width:220px">
  </div>
</div>

<!-- ============= SIMULATION ============= -->
<div class="panel">
  <h2>Simulation</h2>
  <div class="row">
    <button class="primary" onclick="runSingle()">▶ Combat unique (narratif)</button>
    <span style="margin-left:16px"></span>
    <label>N runs</label>
    <input type="number" id="param-N" value="1000" min="10" max="100000" step="100">
    <button class="primary" onclick="runBatch()">▶ Lancer batch</button>
    <span id="run-status" class="muted"></span>
  </div>
</div>

<!-- ============= RÉSULTATS ============= -->
<div class="panel" id="results-panel" style="display:none">
  <h2>Résultats du dernier run</h2>
  <div id="results-content"></div>
</div>

<!-- ============= LOG NARRATIF ============= -->
<div class="panel" id="log-panel" style="display:none">
  <h2>Journal de combat</h2>
  <div id="log-content" class="log"></div>
</div>

<!-- ============= HISTORIQUE ============= -->
<div class="panel">
  <h2>Historique</h2>
  <div class="row">
    <button onclick="exportCSV()">📥 Exporter CSV</button>
    <button onclick="document.getElementById('csv-import').click()">📤 Importer CSV</button>
    <input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importCSV(event)">
    <button class="small danger" onclick="clearHistory()">🗑 Effacer historique</button>
    <span class="muted" id="history-count"></span>
  </div>
  <div id="history-table"></div>
</div>

<script>
/* ===========================================================
   VERMIS MINI — Combat Simulator v0.1
   Moteur fidèle aux règles canon v10 (Vermis_d6_v10.md)
   =========================================================== */

// ---------- RNG seedable (mulberry32) ----------
let _rng = Math.random;
function setSeed(s){
  if(!s) { _rng = Math.random; return; }
  let h = 2166136261;
  for(let i=0;i<s.length;i++){ h = Math.imul(h ^ s.charCodeAt(i), 16777619); }
  let a = h >>> 0;
  _rng = function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function rng(){ return _rng(); }
function rint(min, max){ return Math.floor(rng()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(rng()*arr.length)]; }
function rollD6(){ return rint(1,6); }

// ---------- ÉQUIPEMENT (référence canon v10) ----------
const WEAPONS = [
  {id:'mains',     name:'Mains nues',       dice:1, twohand:false},
  {id:'improv',    name:'Improvisée',        dice:2, twohand:false},
  {id:'dague',     name:'Dague (petite)',    dice:3, twohand:false, tags:['rapide']},
  {id:'matraque',  name:'Matraque (petite)', dice:3, twohand:false},
  {id:'epee_c',    name:'Épée courte (moy)', dice:4, twohand:false},
  {id:'hachette',  name:'Hachette (moy)',    dice:4, twohand:false},
  {id:'masse',     name:'Masse (moy)',       dice:4, twohand:false},
  {id:'lance',     name:'Lance (martiale)',  dice:5, twohand:false},
  {id:'epee_l',    name:'Épée longue (martiale)', dice:5, twohand:false},
  {id:'hache_g',   name:'Hache de guerre (martiale)', dice:5, twohand:false},
  {id:'sweihander',name:'Sweihander (lourde)', dice:6, twohand:true, tags:['lente']},
  {id:'hache_2m',  name:'Hache à 2 mains (lourde)', dice:6, twohand:true, tags:['lente']},
  {id:'halebarde', name:'Hallebarde (lourde)',dice:6, twohand:true, tags:['lente']},
];
const ARMORS = [
  {id:'aucune', name:'Aucune',     diff:0},
  {id:'cuir',   name:'Cuir',       diff:1},
  {id:'maille', name:'Maille',     diff:2},
  {id:'plaque', name:'Plaque',     diff:3},
  {id:'full',   name:'Full plate', diff:4},
];
const SHIELDS = [
  {id:'aucun',   name:'Aucun',         bonus:0},
  {id:'buckler', name:'Buckler',       bonus:1},
  {id:'rond',    name:'Bouclier rond', bonus:2},
  {id:'grand',   name:'Grand bouclier',bonus:3},
];

// ---------- PROFILS PAR TIER (génération aléatoire) ----------
// Référence: Appendice B §16, table "Profils types"
const TIER_PROFILES = {
  1: { name:'Vermine',  attrRange:[2,3], weaponDice:[1,2], armorOdds:{aucune:.7, cuir:.3}, shieldOdds:{aucun:.9, buckler:.1}, donChance:0, expertiseChance:0, aiDefault:'aggressif' },
  2: { name:'Soldat',   attrRange:[3,3], weaponDice:[3,4], armorOdds:{aucune:.2, cuir:.5, maille:.3}, shieldOdds:{aucun:.5, buckler:.3, rond:.2}, donChance:.2, expertiseChance:.1, aiDefault:'prudent' },
  3: { name:'Égal PJ',  attrRange:[3,4], weaponDice:[3,5], armorOdds:{cuir:.4, maille:.5, plaque:.1}, shieldOdds:{aucun:.4, buckler:.3, rond:.3}, donChance:.5, expertiseChance:.4, aiDefault:'prudent' },
  4: { name:'Vétéran',  attrRange:[4,5], weaponDice:[4,5], armorOdds:{maille:.5, plaque:.5}, shieldOdds:{aucun:.3, rond:.5, grand:.2}, donChance:.8, expertiseChance:.7, aiDefault:'tacticien' },
  5: { name:'Élite',    attrRange:[5,5], weaponDice:[5,6], armorOdds:{maille:.2, plaque:.6, full:.2}, shieldOdds:{aucun:.4, rond:.3, grand:.3}, donChance:1.0, expertiseChance:.9, aiDefault:'tacticien' },
  6: { name:'Boss',     attrRange:[6,6], weaponDice:[6,6], armorOdds:{plaque:.4, full:.6}, shieldOdds:{aucun:.5, grand:.5}, donChance:1.0, expertiseChance:1.0, aiDefault:'tacticien' },
};

function pickWeighted(odds){
  const r = rng();
  let cum = 0;
  for(const [k,v] of Object.entries(odds)){
    cum += v;
    if(r < cum) return k;
  }
  return Object.keys(odds)[0];
}

function randomCombatant(tier, idx){
  const p = TIER_PROFILES[tier];
  const attr = rint(p.attrRange[0], p.attrRange[1]);
  // pick weapon by dice range
  const eligibleWeapons = WEAPONS.filter(w => w.dice >= p.weaponDice[0] && w.dice <= p.weaponDice[1]);
  const weapon = pick(eligibleWeapons);
  // shield: only if not two-hand weapon
  const armorId = pickWeighted(p.armorOdds);
  const shieldId = weapon.twohand ? 'aucun' : pickWeighted(p.shieldOdds);
  return {
    name: `${p.name} ${idx}`,
    vig: attr, fin: attr, esp: attr,
    end: attr, pr: attr,
    weaponId: weapon.id,
    armorId, shieldId,
    hasDon: rng() < p.donChance,
    hasExpertise: rng() < p.expertiseChance,
    aiProfile: p.aiDefault,
    blessures: { vig:0, fin:0, esp:0 },
    status: 'alive', // alive | dead | paralyzed | catatonic
    pushUsed: 0, // tracking per-fight
  };
}

function newDefaultCombatant(){
  return {
    name: 'Combattant',
    vig: 4, fin: 4, esp: 4,
    end: 4, pr: 4,
    weaponId: 'epee_c', armorId: 'cuir', shieldId: 'aucun',
    hasDon: false, hasExpertise: false,
    aiProfile: 'prudent',
    blessures: { vig:0, fin:0, esp:0 },
    status: 'alive',
    pushUsed: 0,
  };
}

// ---------- DÉRIVATIONS ----------
function getWeapon(c){ return WEAPONS.find(w => w.id === c.weaponId) || WEAPONS[0]; }
function getArmor(c){  return ARMORS.find(a => a.id === c.armorId) || ARMORS[0]; }
function getShield(c){ return SHIELDS.find(s => s.id === c.shieldId) || SHIELDS[0]; }
function currentVig(c){ return Math.max(0, c.vig - c.blessures.vig); }
function currentFin(c){ return Math.max(0, c.fin - c.blessures.fin); }
function currentEsp(c){ return Math.max(0, c.esp - c.blessures.esp); }
function isAlive(c){ return c.status === 'alive' && currentVig(c) > 1; }
// "ne peut plus agir" inclut état critique (attr=1 sur l'attr offensif)
function canAct(c){ return isAlive(c) && currentVig(c) >= 2; }

// ---------- MOTEUR : POOL & GAINS ----------
/**
 * Roule un pool de N dés avec dé rouge (premier dé) et bonus.
 * @returns {dice, gainsBrut, redDie, hasDouble, hasTriple}
 */
function rollPool(nDice, attr){
  if(nDice < 1) nDice = 1;
  const dice = [];
  let gainsBrut = 0;
  for(let i=0;i<nDice;i++){
    const v = rollD6();
    const success = v < attr;
    const isRed = (i === 0);
    const isOne = (v === 1);
    let gain = 0;
    if(success) gain += 1;          // gain normal
    if(isRed && success) gain += 1; // bonus dé rouge
    if(isOne) gain += 1;            // bonus +1 par 1 (attr toujours >= 2 donc 1 = succès)
    dice.push({ value:v, success, isRed, isOne, gain });
    gainsBrut += gain;
  }
  // doubles/triples parmi les succès (déclencheurs d'effets, on les détecte mais on n'applique pas auto)
  const succValues = dice.filter(d => d.success).map(d => d.value);
  const counts = {};
  succValues.forEach(v => counts[v] = (counts[v]||0)+1);
  const maxCount = Math.max(0, ...Object.values(counts));
  return {
    dice, gainsBrut,
    hasDouble: maxCount >= 2,
    hasTriple: maxCount >= 3,
  };
}

/**
 * Construit le pool d'attaque pour un combattant.
 * Inclut dés d'arme + Don (+1d si applicable) + Expertise (+1d si applicable) + push (Bet).
 */
function buildAttackPool(attacker, push){
  const weapon = getWeapon(attacker);
  let pool = weapon.dice;
  if(attacker.hasDon) pool += 1;        // hypothèse: Don applicable en combat (situationnel)
  if(attacker.hasExpertise) pool += 1;  // hypothèse: Expertise applicable (option +1d)
  pool += (push || 0);
  return pool;
}

/**
 * Difficulté défensive : armure + (bouclier si actif passif) + bonus situationnels.
 */
function defenseDifficulty(defender, opts){
  const armor = getArmor(defender);
  const shield = getShield(defender);
  let diff = armor.diff;
  if(opts && opts.shieldsActive) diff += shield.bonus;
  return diff;
}

/**
 * Applique les dégâts (gains nets) au défenseur.
 * - END > 0 : END -= gains; min 0
 * - END == 0 ET hit successful : 1 Blessure
 * - Blessure réduit attr selon damageType (par défaut: physique → vig)
 * - attr à 0 → mort/paralysé/catatonique
 */
function applyDamage(defender, netGains, damageType, log){
  if(netGains <= 0) return { wounded:false, killed:false };
  let wounded = false;
  if(defender.end > 0){
    const before = defender.end;
    defender.end = Math.max(0, defender.end - netGains);
    if(log) log.push({t:'damage', msg:` → ${before}→${defender.end} END (−${before-defender.end})`});
  } else {
    // END déjà à 0 : une Blessure (peu importe la magnitude, 1 hit = 1 wound)
    defender.blessures[damageType] += 1;
    wounded = true;
    if(log) log.push({t:'damage', msg:` → BLESSURE ${damageType.toUpperCase()} (-1 ${damageType}, total ${defender.blessures[damageType]})`});
    // vérifier état critique / mort
    const cur = damageType === 'vig' ? currentVig(defender)
              : damageType === 'fin' ? currentFin(defender)
              : currentEsp(defender);
    if(cur <= 0){
      defender.status = damageType === 'vig' ? 'dead'
                       : damageType === 'fin' ? 'paralyzed' : 'catatonic';
      if(log) log.push({t:'death', msg:` ☠ ${defender.name} : ${defender.status.toUpperCase()}`});
      return { wounded, killed: true };
    }
  }
  return { wounded, killed:false };
}

// ---------- IA : décision tour par tour ----------
function aiDecide(combatant, allies, enemies, opts){
  const aliveEnemies = enemies.filter(canAct);
  if(aliveEnemies.length === 0) return { action:'idle' };

  const profile = combatant.aiProfile;
  const maxPush = currentEsp(combatant);
  const endRatio = combatant.end / Math.max(1, combatant.vig);

  // Deuxième souffle ? Action complète, pas d'attaque ce tour
  // - Prudent : si END <= 1 et PR > 0
  // - Tacticien : si END <= 2 et PR > 0 et au moins 1 ennemi à attaquer ensuite
  if(profile === 'prudent' && combatant.end <= 1 && combatant.pr > 0){
    return { action:'breath' };
  }
  if(profile === 'tacticien' && combatant.end <= 2 && combatant.pr > 0 && aliveEnemies.length > 0){
    return { action:'breath' };
  }
  if(profile === 'aggressif' && combatant.end === 0 && combatant.pr > 0){
    return { action:'breath' };
  }

  // Choix de cible
  let target;
  if(profile === 'tacticien'){
    // cible la plus faible (END le plus bas, puis Blessures le plus haut)
    target = aliveEnemies.slice().sort((a,b) => {
      const ka = a.end + (a.vig - a.blessures.vig)*10;
      const kb = b.end + (b.vig - b.blessures.vig)*10;
      return ka - kb;
    })[0];
  } else {
    target = pick(aliveEnemies);
  }

  // Push : combien de dés ajouter ?
  let push = 0;
  const targetDiff = defenseDifficulty(target, opts);
  if(profile === 'aggressif'){
    // toujours push si END > 2, +2 si target lourd
    if(combatant.end > 2){
      push = Math.min(maxPush, targetDiff >= 3 ? 2 : 1);
      push = Math.min(push, combatant.end - 1);
    }
  } else if(profile === 'prudent'){
    // push seulement pour finir (target END <= 1) ou face à diff >= 3 si END >= 4
    if(target.end <= 1 && combatant.end >= 2) push = 1;
    else if(targetDiff >= 3 && combatant.end >= 4) push = 1;
    push = Math.min(push, maxPush);
  } else if(profile === 'tacticien'){
    // push 1d si target armuré (diff >= 2) et END >= 3 ; +1 si target END <= 1
    if(targetDiff >= 2 && combatant.end >= 3) push = 1;
    if(target.end <= 1 && combatant.end >= 2) push = Math.max(push, 1);
    push = Math.min(push, maxPush);
  }

  return { action:'attack', target, push };
}

// ---------- TOUR DE COMBAT ----------
function takeTurn(combatant, allies, enemies, opts, log){
  if(!canAct(combatant)){
    if(log) log.push({t:'info', msg:` ${combatant.name} ne peut pas agir.`});
    return;
  }
  const decision = aiDecide(combatant, allies, enemies, opts);

  if(decision.action === 'breath'){
    combatant.pr -= 1;
    const heal = rollD6();
    const before = combatant.end;
    combatant.end = Math.min(combatant.vig, combatant.end + heal);
    if(log) log.push({t:'heal', msg:` ${combatant.name} reprend son souffle (1 PR → +${heal} END : ${before}→${combatant.end})`});
    return;
  }

  if(decision.action !== 'attack') return;

  const target = decision.target;
  const push = decision.push;
  const attackAttr = currentVig(combatant); // mêlée = VIG
  // payer le push (END dépensée d'avance)
  if(push > 0){
    combatant.end = Math.max(0, combatant.end - push);
    combatant.pushUsed += push;
  }
  const pool = buildAttackPool(combatant, push);
  const diff = defenseDifficulty(target, opts);
  const roll = rollPool(pool, attackAttr);
  const netGains = Math.max(0, roll.gainsBrut - diff);

  if(log){
    const diceStr = roll.dice.map(d => {
      const cls = [];
      if(d.isRed) cls.push('red');
      if(d.success) cls.push('success');
      if(d.isOne) cls.push('one');
      return `<span class="die ${cls.join(' ')}">${d.value}</span>`;
    }).join('');
    const pushStr = push > 0 ? ` (push +${push}d, -${push} END)` : '';
    log.push({t:'attack', msg:` ${combatant.name} (A${attackAttr}, ${pool}d) attaque ${target.name} (diff ${diff})${pushStr} : ${diceStr} = ${roll.gainsBrut} bruts − ${diff} = <b>${netGains}</b>${roll.hasTriple?' [triple!]':roll.hasDouble?' [double]':''}`});
  }

  if(netGains > 0){
    applyDamage(target, netGains, 'vig', log); // mêlée = physique → VIG
  } else {
    if(log) log.push({t:'info', msg:` → aucun dégât.`});
  }
}

// ---------- COMBAT COMPLET ----------
function simulateCombat(teamA, teamB, opts){
  // Reset état combat (deep copy implicite via init)
  const A = teamA.map(c => resetCombatant(c));
  const B = teamB.map(c => resetCombatant(c));
  const log = opts.narrative ? [] : null;
  let round = 0;
  const maxRounds = opts.maxRounds || 30;

  // Surprise : un round gratuit pour l'équipe surprenante
  if(opts.surpriseA){
    if(log) log.push({t:'round', msg:`— Round de surprise (Équipe A) —`});
    for(const c of A) if(canAct(c)) takeTurn(c, A, B, opts, log);
  }
  if(opts.surpriseB){
    if(log) log.push({t:'round', msg:`— Round de surprise (Équipe B) —`});
    for(const c of B) if(canAct(c)) takeTurn(c, B, A, opts, log);
  }

  while(round < maxRounds){
    round++;
    if(log) log.push({t:'round', msg:`\n═══ Round ${round} ═══`});
    // Ordre d'initiative : interleavé, randomisé par round
    const order = [...A.map((c,i)=>({c,team:'A',i})), ...B.map((c,i)=>({c,team:'B',i}))];
    // simple shuffle
    for(let i=order.length-1;i>0;i--){
      const j = Math.floor(rng()*(i+1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    for(const slot of order){
      if(!canAct(slot.c)) continue;
      const allies = slot.team === 'A' ? A : B;
      const enemies = slot.team === 'A' ? B : A;
      takeTurn(slot.c, allies, enemies, opts, log);
      // condition de victoire en cours de round ?
      if(!A.some(canAct) || !B.some(canAct)) break;
    }
    if(!A.some(canAct) || !B.some(canAct)) break;
  }

  const aAlive = A.filter(canAct).length;
  const bAlive = B.filter(canAct).length;
  let winner;
  if(aAlive > 0 && bAlive === 0) winner = 'A';
  else if(bAlive > 0 && aAlive === 0) winner = 'B';
  else if(round >= maxRounds) winner = 'timeout';
  else winner = 'draw';

  if(log){
    log.push({t:'victory', msg:`Vainqueur : ${winner === 'timeout' ? 'TIMEOUT' : winner === 'draw' ? 'DRAW' : 'Équipe '+winner} · ${round} rounds · A survivants: ${aAlive} · B survivants: ${bAlive}`});
  }

  return {
    winner, round, aAlive, bAlive,
    aCasualties: A.length - aAlive,
    bCasualties: B.length - bAlive,
    aDeaths: A.filter(c => c.status === 'dead').length,
    bDeaths: B.filter(c => c.status === 'dead').length,
    aEndLost: A.reduce((s,c) => s + (c.vig - c.end), 0),
    bEndLost: B.reduce((s,c) => s + (c.vig - c.end), 0),
    aBlessures: A.reduce((s,c) => s + c.blessures.vig + c.blessures.fin + c.blessures.esp, 0),
    bBlessures: B.reduce((s,c) => s + c.blessures.vig + c.blessures.fin + c.blessures.esp, 0),
    aPushUsed: A.reduce((s,c) => s + c.pushUsed, 0),
    bPushUsed: B.reduce((s,c) => s + c.pushUsed, 0),
    log,
    finalA: A, finalB: B,
  };
}

function resetCombatant(c){
  return {
    ...c,
    end: c.vig,
    pr: c.vig,
    blessures: { vig:0, fin:0, esp:0 },
    status: 'alive',
    pushUsed: 0,
  };
}

// ---------- BATCH MONTE CARLO ----------
function runBatchSim(teamA, teamB, opts, N){
  const results = [];
  for(let i=0;i<N;i++){
    results.push(simulateCombat(teamA, teamB, { ...opts, narrative:false }));
  }
  // agrégats
  const wins = { A:0, B:0, draw:0, timeout:0 };
  let sumRounds=0, sumAEnd=0, sumBEnd=0, sumABless=0, sumBBless=0;
  let sumACasualty=0, sumBCasualty=0, sumADeath=0, sumBDeath=0;
  let sumAPush=0, sumBPush=0;
  const roundDist = {};
  for(const r of results){
    wins[r.winner]++;
    sumRounds += r.round;
    sumAEnd += r.aEndLost;
    sumBEnd += r.bEndLost;
    sumABless += r.aBlessures;
    sumBBless += r.bBlessures;
    sumACasualty += r.aCasualties;
    sumBCasualty += r.bCasualties;
    sumADeath += r.aDeaths;
    sumBDeath += r.bDeaths;
    sumAPush += r.aPushUsed;
    sumBPush += r.bPushUsed;
    roundDist[r.round] = (roundDist[r.round]||0)+1;
  }
  return {
    N,
    winRateA: wins.A / N,
    winRateB: wins.B / N,
    drawRate: wins.draw / N,
    timeoutRate: wins.timeout / N,
    avgRounds: sumRounds / N,
    avgAEndLost: sumAEnd / N,
    avgBEndLost: sumBEnd / N,
    avgABlessures: sumABless / N,
    avgBBlessures: sumBBless / N,
    avgACasualties: sumACasualty / N,
    avgBCasualties: sumBCasualty / N,
    avgADeaths: sumADeath / N,
    avgBDeaths: sumBDeath / N,
    avgAPushUsed: sumAPush / N,
    avgBPushUsed: sumBPush / N,
    roundDist,
  };
}

/* ============================================================
   Runs
   ============================================================ */
function getOpts(){
  return {
    maxRounds: parseInt(document.getElementById('param-maxRounds').value),
    shieldsActive: document.getElementById('param-shieldsActive').checked,
    surpriseA: document.getElementById('param-surpriseA').checked,
    surpriseB: document.getElementById('param-surpriseB').checked,
  };
}

function runSingle(){
  if(state.teamA.length === 0 || state.teamB.length === 0){
    alert('Les deux équipes doivent être non vides.'); return;
  }
  setSeed(document.getElementById('param-seed').value);
  const opts = { ...getOpts(), narrative:true };
  const result = simulateCombat(state.teamA, state.teamB, opts);
  showSingleResult(result);
}

function runBatch(){
  if(state.teamA.length === 0 || state.teamB.length === 0){
    alert('Les deux équipes doivent être non vides.'); return;
  }
  const N = parseInt(document.getElementById('param-N').value);
  setSeed(document.getElementById('param-seed').value);
  const opts = getOpts();
  const status = document.getElementById('run-status');
  status.textContent = ' · simulation en cours…';
  // async pour laisser le DOM respirer
  setTimeout(() => {
    const t0 = performance.now();
    const agg = runBatchSim(state.teamA, state.teamB, opts, N);
    const t1 = performance.now();
    status.textContent = ` · ${N} runs en ${((t1-t0)/1000).toFixed(2)}s`;
    const scenario = document.getElementById('param-scenario').value || 'Sans nom';
    const entry = {
      timestamp: new Date().toISOString(),
      scenario,
      teamA: state.teamA, teamB: state.teamB,
      opts, N,
      agg,
    };
    state.history.unshift(entry);
    saveHistory();
    renderHistory();
    showBatchResult(entry);
  }, 50);
}

function saveHistory(){
  // localStorage ne supporte pas plus de ~5MB; tronquer si nécessaire
  try {
    localStorage.setItem('vermisCombatHistory', JSON.stringify(state.history.slice(0,50)));
  } catch(e){
    state.history = state.history.slice(0,20);
    localStorage.setItem('vermisCombatHistory', JSON.stringify(state.history));
  }
}
function clearHistory(){
  if(!confirm('Effacer tout l\'historique ?')) return;
  state.history = [];
  saveHistory();
  renderHistory();
}
function renderHistory(){
  const el = document.getElementById('history-table');
  document.getElementById('history-count').textContent = `${state.history.length} runs`;
  if(state.history.length === 0){ el.innerHTML = '<div class="muted">aucun historique pour l\'instant</div>'; return; }
  el.innerHTML = `<table>
    <thead><tr>
      <th>Date</th><th>Scénario</th><th>A</th><th>B</th><th>N</th>
      <th>%A</th><th>%B</th><th>Rounds</th>
      <th>Actions</th>
    </tr></thead><tbody>
    ${state.history.map((h,i) => {
      const date = new Date(h.timestamp).toLocaleString('fr-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      const ta = h.teamA.length + ' (T'+inferTier(h.teamA)+')';
      const tb = h.teamB.length + ' (T'+inferTier(h.teamB)+')';
      return `<tr>
        <td class="muted">${date}</td>
        <td>${h.scenario}</td>
        <td>${ta}</td><td>${tb}</td>
        <td>${h.N}</td>
        <td style="color:var(--accent)">${(h.agg.winRateA*100).toFixed(1)}%</td>
        <td style="color:var(--accent2)">${(h.agg.winRateB*100).toFixed(1)}%</td>

    }).join('')}

function inferTier(team){
  const avgVig = team.reduce((s,c)=>s+c.vig,0)/team.length;
  return Math.round(avgVig);
}
function loadHistoryEntry(i){
  const h = state.history[i];
  state.teamA = JSON.parse(JSON.stringify(h.teamA));
  state.teamB = JSON.parse(JSON.stringify(h.teamB));
  document.getElementById('param-scenario').value = h.scenario;
  document.getElementById('param-N').value = h.N;
  document.getElementById('param-maxRounds').value = h.opts.maxRounds;
  document.getElementById('param-shieldsActive').checked = !!h.opts.shieldsActive;
  document.getElementById('param-surpriseA').checked = !!h.opts.surpriseA;
  document.getElementById('param-surpriseB').checked = !!h.opts.surpriseB;
  renderTeam('A'); renderTeam('B');
}
function removeHistoryEntry(i){
  state.history.splice(i,1);
  saveHistory();
  renderHistory();
}

function csvEscape(v){
  if(v == null) return '';
  const s = String(v);
  if(s.includes(',') || s.includes('"') || s.includes('\n')){
    return '"' + s.replace(/"/g,'""') + '"';
  }
  return s;
}
function exportCSV(){
  if(state.history.length === 0){ alert('Historique vide.'); return; }
  const headers = [
    'timestamp','scenario','teamA_size','teamB_size','teamA_tier','teamB_tier',
    'N','maxRounds','shieldsActive','surpriseA','surpriseB',
    'winRateA','winRateB','drawRate','timeoutRate','avgRounds',
    'avgADeaths','avgBDeaths','avgACasualties','avgBCasualties',
    'avgAEndLost','avgBEndLost','avgABlessures','avgBBlessures',
    'avgAPushUsed','avgBPushUsed',
    'scenario_json'
  ];
  const rows = state.history.map(h => {
    const json = JSON.stringify({ teamA:h.teamA, teamB:h.teamB, opts:h.opts, agg:h.agg });
    return [
      h.timestamp, h.scenario,
      h.teamA.length, h.teamB.length, inferTier(h.teamA), inferTier(h.teamB),
      h.N, h.opts.maxRounds, h.opts.shieldsActive?1:0, h.opts.surpriseA?1:0, h.opts.surpriseB?1:0,
      h.agg.winRateA.toFixed(4), h.agg.winRateB.toFixed(4),
      h.agg.drawRate.toFixed(4), h.agg.timeoutRate.toFixed(4),
      h.agg.avgRounds.toFixed(3),
      h.agg.avgADeaths.toFixed(3), h.agg.avgBDeaths.toFixed(3),
      h.agg.avgACasualties.toFixed(3), h.agg.avgBCasualties.toFixed(3),
      h.agg.avgAEndLost.toFixed(2), h.agg.avgBEndLost.toFixed(2),
      h.agg.avgABlessures.toFixed(3), h.agg.avgBBlessures.toFixed(3),
      h.agg.avgAPushUsed.toFixed(3), h.agg.avgBPushUsed.toFixed(3),
      json,
    ].map(csvEscape).join(',');
  });
  const csv = headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'}); // BOM pour Excel
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `vermis_combat_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function parseCSV(text){
  // Parser simple gérant les guillemets et les virgules dans les champs
  const rows = [];
  let cur = []; let field = ''; let inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ cur.push(field); field = ''; }
      else if(c === '\n'){ cur.push(field); rows.push(cur); cur=[]; field=''; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field || cur.length) { cur.push(field); rows.push(cur); }
  return rows;
}
function importCSV(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let text = e.target.result;
    if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
    const rows = parseCSV(text);
    if(rows.length < 2){ alert('CSV vide.'); return; }
    const headers = rows[0];
    const jsonIdx = headers.indexOf('scenario_json');
    if(jsonIdx === -1){ alert('Colonne scenario_json manquante. Ce CSV ne peut pas être rechargé en entier.'); return; }
    const newEntries = [];
    for(let r=1;r<rows.length;r++){
      if(rows[r].length < headers.length) continue;
      try {
        const data = JSON.parse(rows[r][jsonIdx]);
        newEntries.push({
          timestamp: rows[r][headers.indexOf('timestamp')] || new Date().toISOString(),
          scenario: rows[r][headers.indexOf('scenario')] || 'Importé',
          N: parseInt(rows[r][headers.indexOf('N')]) || 100,
          teamA: data.teamA, teamB: data.teamB,
          opts: data.opts, agg: data.agg,
        });
      } catch(e){ console.warn('Ligne ignorée :', e); }
    }
    state.history = [...newEntries, ...state.history];
    saveHistory();
    renderHistory();
    alert(`${newEntries.length} entrées importées.`);
  };
  reader.readAsText(file);
  ev.target.value = '';
}
