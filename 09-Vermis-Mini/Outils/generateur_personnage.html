<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vermis-Mini — Générateur de personnage</title>
<style>
  :root {
    --bg: #14110f;
    --bg-card: #1f1a16;
    --bg-card-2: #2a231d;
    --ink: #d6c8a8;
    --ink-dim: #8a7e68;
    --ink-bright: #f0e4c4;
    --accent: #8b1a1a;
    --accent-dim: #5a1010;
    --border: #3a2d22;
    --red: #c1392b;
    --green: #4a7a3a;
    --blue: #3a5a8a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    line-height: 1.5;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(139, 26, 26, 0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(58, 90, 138, 0.05), transparent 40%);
  }

  header {
    text-align: center;
    padding: 28px 16px 8px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Trajan Pro', 'Cinzel', Georgia, serif;
    margin: 0;
    font-size: 2.2rem;
    letter-spacing: 0.08em;
    color: var(--ink-bright);
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }

  header .subtitle {
    margin-top: 4px;
    color: var(--ink-dim);
    font-style: italic;
    font-size: 0.95rem;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 18px 0 26px;
  }

  button {
    background: var(--accent-dim);
    color: var(--ink-bright);
    border: 1px solid var(--accent);
    padding: 10px 22px;
    font-family: inherit;
    font-size: 1rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    border-radius: 2px;
  }

  button:hover {
    background: var(--accent);
  }

  button:active {
    transform: translateY(1px);
  }

  button.secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--ink);
  }

  button.secondary:hover {
    background: var(--bg-card);
    border-color: var(--ink-dim);
  }

  .dice-row {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }

  .die {
    width: 90px;
    height: 90px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Trajan Pro', Georgia, serif;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    border: 2px solid rgba(0,0,0,0.4);
    position: relative;
  }

  .die .pos {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    opacity: 0.85;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .die .val {
    font-size: 2.6rem;
    line-height: 1;
    font-weight: bold;
  }

  .die .label {
    font-size: 0.65rem;
    margin-top: 4px;
    opacity: 0.85;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .die.red { background: linear-gradient(145deg, #d04a3c, #8b1f17); color: #fff5e6; }
  .die.green { background: linear-gradient(145deg, #5a8a48, #2d4a25); color: #f0f5e0; }
  .die.blue { background: linear-gradient(145deg, #4a7ab0, #1a3a6a); color: #e8f0fa; }

  .character {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 18px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .card h2 {
    margin: 0 0 10px;
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    font-weight: normal;
  }

  .name-banner {
    text-align: center;
    padding: 14px 16px 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .name-text {
    font-family: 'Trajan Pro', 'Cinzel', Georgia, serif;
    font-size: 2rem;
    letter-spacing: 0.05em;
    color: var(--ink-bright);
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    line-height: 1.1;
  }

  .name-arch {
    color: #b88a4a;
    font-size: 1.4rem;
    font-style: italic;
    letter-spacing: 0.04em;
  }

  .name-meta {
    margin-top: 4px;
    color: var(--ink-dim);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card.stats h2 { color: #d4a850; }
  .card.descriptions h2 { color: var(--accent); }
  .card.capacites h2 { color: #6a9aaa; }
  .card.inventaire h2 { color: #8a8a4a; }

  .stats-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: stretch;
  }
  .stats-grid .attr {
    flex: 1;
    min-width: 100px;
  }
  .attr.armure {
    border-color: #5a5a3a;
    background: linear-gradient(180deg, var(--bg-card-2), #2a2a1c);
  }
  .attr.armure .num { color: #d4d488; }
  .attr.or {
    border-color: #6a5a2a;
    background: linear-gradient(180deg, var(--bg-card-2), #2c2614);
  }
  .attr.or .num { color: #e8c860; }

  /* Vitesse — teinte selon chargement */
  .attr.vit-rapide {
    border-color: #3a6a3a;
    background: linear-gradient(180deg, var(--bg-card-2), #1c2c1c);
  }
  .attr.vit-rapide .num { color: #88d488; }
  .attr.vit-moyen {
    border-color: #6a5a2a;
    background: linear-gradient(180deg, var(--bg-card-2), #2c2614);
  }
  .attr.vit-moyen .num { color: #d4c060; }
  .attr.vit-lent {
    border-color: #6a3a3a;
    background: linear-gradient(180deg, var(--bg-card-2), #2c1414);
  }
  .attr.vit-lent .num { color: #d48888; }

  .stat-block.charge-rapide { border-color: #3a6a3a; }
  .stat-block.charge-moyen { border-color: #6a5a2a; }
  .stat-block.charge-lent { border-color: #6a3a3a; }

  .field {
    margin-bottom: 8px;
    display: flex;
    gap: 8px;
    align-items: baseline;
  }

  .field .lbl {
    color: var(--ink-dim);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    min-width: 110px;
    flex-shrink: 0;
  }

  .field .val {
    color: var(--ink-bright);
    font-weight: 500;
  }

  .attrs {
    display: flex;
    gap: 14px;
    margin: 8px 0;
  }

  .attr {
    flex: 1;
    text-align: center;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    padding: 8px 4px;
    border-radius: 3px;
  }

  .attr .name {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  .attr .num {
    font-size: 1.6rem;
    font-weight: bold;
    color: var(--ink-bright);
    font-family: 'Trajan Pro', Georgia, serif;
    line-height: 1.1;
    margin-top: 2px;
  }

  ul.compact {
    list-style: none;
    padding: 0;
    margin: 4px 0;
  }

  ul.compact li {
    padding: 3px 0 3px 14px;
    position: relative;
    font-size: 0.95rem;
  }

  ul.compact li::before {
    content: '◆';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.6rem;
    top: 8px;
  }

  ul.compact li.bonus::before {
    content: '★';
    color: #d4a850;
  }

  ul.compact li {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .slot-tag {
    font-size: 0.75rem;
    color: var(--ink-dim);
    font-style: italic;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .slot-reduction {
    color: #d4a850;
    font-style: normal;
    font-weight: bold;
  }

  .inv-stats {
    display: flex;
    gap: 14px;
    margin-bottom: 12px;
  }

  .stat-block {
    flex: 1;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 12px;
    text-align: center;
  }

  .stat-name {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .stat-val {
    font-size: 1.7rem;
    font-weight: bold;
    color: var(--ink-bright);
    font-family: 'Trajan Pro', Georgia, serif;
    margin-top: 4px;
    line-height: 1;
  }

  .stat-unit {
    font-size: 0.85rem;
    color: var(--ink-dim);
    font-weight: normal;
    margin-left: 2px;
  }

  .stat-formula {
    font-size: 0.7rem;
    color: var(--ink-dim);
    font-style: italic;
    margin-top: 3px;
  }

  .attr.end {
    border-color: #6a4a3a;
    background: linear-gradient(180deg, var(--bg-card-2), #2c1f18);
  }
  .attr.end .num { color: #e8b884; }

  .pill {
    display: inline-block;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 0.8rem;
    margin-right: 4px;
    color: var(--ink);
  }

  .formula {
    color: var(--ink-dim);
    font-size: 0.78rem;
    font-style: italic;
    margin-left: 4px;
  }

  .empty-state {
    text-align: center;
    color: var(--ink-dim);
    font-style: italic;
    padding: 60px 20px;
  }

  .footnote {
    text-align: center;
    margin-top: 30px;
    color: var(--ink-dim);
    font-size: 0.78rem;
    font-style: italic;
  }

  .placeholder { color: var(--ink-dim); font-style: italic; font-size: 0.85rem; }

  .copy-confirm {
    color: #4a8a4a;
    font-size: 0.9rem;
    align-self: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .copy-confirm.show { opacity: 1; }

  /* Print */
  @media print {
    body { background: white; color: black; }
    button, .controls { display: none; }
    .card { border: 1px solid #999; box-shadow: none; }
    .die { box-shadow: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Vermis-Mini</h1>
  <div class="subtitle">Générateur de personnage — 3d6 colorés</div>
</header>

<main>

</main>

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function feminize(text) {
  if (!text) return text;
  // Tri longueur desc pour matcher les multi-mots avant les simples
  const keys = Object.keys(FEM_MAP).sort((a, b) => b.length - a.length);
  let result = text;
  for (const k of keys) {
    // Bordure non-lettre Unicode des deux côtés (gère É, è, etc.)
    const re = new RegExp('(?<!\\p{L})' + escapeRegex(k) + '(?!\\p{L})', 'gu');
    result = result.replace(re, FEM_MAP[k]);
  }
  return result;
}

function fem(text, isFemale) {
  return isFemale ? feminize(text) : text;
}

   ===================================================================== */

function rollD6() { return Math.floor(Math.random() * 6) + 1; }

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Détermine combien de places d'inventaire un item occupe (heuristique sur le nom) */
function itemSlots(name) {
  const n = name.toLowerCase();
  // Armures (3 catégories : légère=1, moyenne=2, lourde=3)
  if (n.includes('full plate') || n.includes('armure complète')
      || n.includes('plaque')) return 3;
  if (n.includes('cotte de mailles') || n.includes('maille')) return 2;
  if (n.includes('armure de cuir') || n.includes('cuir')) return 1;
  // Boucliers
  if (n.includes('grand bouclier')) return 2;
  // Armes lourdes / 2 mains explicites
  if (n.includes('deux mains') || n.includes('2 mains')
      || n.includes('sweihander') || n.includes('zweihander')
      || n.includes('hallebarde') || n.includes('halebarde')) return 2;
  // Grimoire : explicite à 1 place (malgré le "(6 slots)" de capacité magique)
  if (n.includes('grimoire')) return 1;
  return 1;
}

/* Niveau de chargement et vitesse de déplacement */
function chargement(slots) {
  if (slots <= 5) return { niveau: 'Léger', vitesse: 'Rapide', valeur: 8 };
  if (slots <= 10) return { niveau: 'Chargé', vitesse: 'Moyen', valeur: 6 };
  return { niveau: 'Surchargé', vitesse: 'Lent', valeur: 4 };
}

/* Extrait les PA d'un item style "Cotte de mailles (2 RD)" */
function itemPA(name) {
  const m = name.match(/(\d+)\s*RD/i);
  return m ? parseInt(m[1], 10) : 0;
}

function lookupRange(table, value) {
  for (const key of Object.keys(table)) {
    if (key.includes('-')) {
      const [lo, hi] = key.split('-').map(Number);
      if (value >= lo && value <= hi) return table[key];
    } else {
      if (Number(key) === value) return table[key];
    }
  }
  return '—';
}

let currentChar = null;

function generate() {
  // 1. Lance les 3 dés colorés
  const dieValues = { red: rollD6(), green: rollD6(), blue: rollD6() };

  // 2. Place-les dans un ordre aléatoire (D1, D2, D3 = position de gauche à droite)
  const positions = shuffle(['red', 'green', 'blue']);
  const dice = positions.map((color, i) => ({
    pos: i + 1,
    color,
    value: dieValues[color]
  }));

  const D1 = dice[0].value;
  const D2 = dice[1].value;
  const D3 = dice[2].value;
  const DR = dieValues.red;
  const DV = dieValues.green;
  const DB = dieValues.blue;

  // 3. Lookups primaires
  const approche = APPROCHE[D1];
  const origine = ORIGINE[D2];
  const motivation = MOTIVATION[D3];

  // 4. Lookups secondaires (couleur)
  const handicap = approche.handicap[DR - 1];
  const malchance = lookupRange(origine.malchance, DV);
  const don = lookupRange(motivation.don, DB);
  const traitDistinctif = lookupRange(motivation.trait, D2 + DV);

  // 5. Archétype (Type × Origine)
  const archetypeData = ARCHETYPE[approche.type][D2];
  const occupation = archetypeData.occupations[D3 - 1];

  // 6. Ressources
  const or = (D3 + DB) * 10;
  const age = 2 * (D1 + DR) + 15;
  const end = approche.attrs.VIG; // END = VIG
  const invMax = 10 + approche.attrs.VIG;

  // 7. Nom
  const name = generateName();

  currentChar = {
    name,
    dice, D1, D2, D3, DR, DV, DB,
    approche, origine, motivation,
    handicap, malchance, don, traitDistinctif,
    archetype: archetypeData, occupation,
    or, age, end, invMax
  };

  render(currentChar);
}

    <div class="card descriptions">
      <h2>Description</h2>
      <div class="field"><span class="lbl">Approche</span><span class="val">${typeNom} <span class="formula">(D1=${c.D1})</span></span></div>
      <div class="field"><span class="lbl">Origine</span><span class="val">${origNom} <span class="formula">(D2=${c.D2})</span></span></div>
      <div class="field"><span class="lbl">Motivation</span><span class="val">${m.nom} <span class="formula">(D3=${c.D3})</span></span></div>
      <div class="field"><span class="lbl">Archétype</span><span class="val">${archNom}</span></div>
      <div class="field"><span class="lbl">Occupation</span><span class="val">${occupNom}</span></div>
      <div class="field"><span class="lbl">Trait</span><span class="val">${c.traitDistinctif} <span class="formula">(D2+D-Vert=${c.D2 + c.DV})</span></span></div>
      <div class="field"><span class="lbl">Malchance</span><span class="val">${c.malchance} <span class="formula">(D-Vert=${c.DV})</span></span></div>
      <div class="field"><span class="lbl">Âge</span><span class="val">${c.age} ans <span class="formula">(2×(D1+D-Rouge)+15)</span></span></div>
    </div>

    <!-- CAPACITÉS (droite) -->
    <div class="card capacites">
      <h2>Capacités</h2>
      <div class="field"><span class="lbl">Expertises</span><span class="val">${allExpertises.join(', ')}</span></div>
      <div class="field"><span class="lbl">Don</span><span class="val">${c.don} <span class="formula">(D-Bleu=${c.DB})</span></span></div>
      <div class="field"><span class="lbl">Handicap</span><span class="val">${c.handicap} <span class="formula">(D-Rouge=${c.DR})</span></span></div>
      ${arch.sorts ? `<div class="field"><span class="lbl">Sorts</span><span class="val">${arch.sorts.join(', ')}</span></div>` : ''}
    </div>

    <!-- INVENTAIRE (bas, pleine largeur) -->
    <div class="card inventaire" style="grid-column: 1 / -1;">
      <h2>Inventaire</h2>
      <div class="inv-stats">
        <div class="stat-block">
          <div class="stat-name">Emplacements</div>
          <div class="stat-val" style="color: ${slotColor}">${slotsUsed}<span class="stat-unit">/${c.invMax}</span></div>
          <div class="stat-formula">max = 10 + VIG</div>
        </div>
        <div class="stat-block charge-${charge.vitesse.toLowerCase()}">
          <div class="stat-name">Chargement</div>
          <div class="stat-val">${charge.niveau}</div>
          <div class="stat-formula">Déplacement ${charge.vitesse} (${charge.valeur})</div>
        </div>
      </div>
      <ul class="compact">
        ${allItems.map(i => `
          <li class="${i.bonus ? 'bonus' : ''}">
            <span>${i.txt}</span>
            <span class="slot-tag">${i.slots} empl.${i.bonus && i.baseSlots > 0 ? ' <span class="slot-reduction">(−1)</span>' : ''}</span>
          </li>`).join('')}
      </ul>
      <p style="font-size: 0.8rem; color: var(--ink-dim); margin-top: 8px; font-style: italic;">
        ★ = item personnalisé de l'archétype : +1d sur son pool, −1 emplacement (min 0).
      </p>
    </div>
  `;
}

function toMarkdown(c) {
  const a = c.approche, o = c.origine, m = c.motivation, arch = c.archetype;
  const F = c.name.genre === 'F';
  const archNom = fem(arch.nom, F);
  const typeNom = fem(a.type, F);
  const origNom = fem(o.nom, F);
  const occupNom = fem(c.occupation.nom, F);
  const rawItems = [
    ...a.items.map(i => ({ txt: i, bonus: false })),
    ...arch.itemPerso.map(i => ({
      txt: i.startsWith('*') ? i.slice(1).trim() + ' (+1d)' : i,
      bonus: i.startsWith('*')
    })),
    { txt: `${occupNom} — ${c.occupation.item}`, bonus: false }
  ];
  const items = rawItems.map(i => {
    const base = itemSlots(i.txt);
    return {
      txt: i.txt,
      bonus: i.bonus,
      slots: i.bonus ? Math.max(0, base - 1) : base,
      pa: itemPA(i.txt)
    };
  });
  const slotsUsed = items.reduce((s, i) => s + i.slots, 0);
  const totalPA = items.reduce((s, i) => s + i.pa, 0);
  const charge = chargement(slotsUsed);

  return `# ${c.name.complet}

*${F ? 'Femme' : 'Homme'} — ${typeNom}, ${origNom}*

**Jet** : D1=${c.D1} (${c.dice[0].color}) · D2=${c.D2} (${c.dice[1].color}) · D3=${c.D3} (${c.dice[2].color})
**Couleurs** : Rouge=${c.DR} · Vert=${c.DV} · Bleu=${c.DB}

## Stats
- **VIG** ${a.attrs.VIG} · **FIN** ${a.attrs.FIN} · **ESP** ${a.attrs.ESP} · **END** ${c.end}
- **Armure** : ${totalPA} RD
- **Vitesse** : ${charge.vitesse} (${charge.valeur}) — Chargement ${charge.niveau}
- **Or** : ${c.or} po

## Description
- **Approche** : ${typeNom}
- **Origine** : ${origNom}
- **Motivation** : ${m.nom}
- **Archétype** : ${archNom}
- **Occupation** : ${occupNom}
- **Trait distinctif** : ${c.traitDistinctif}
- **Malchance** : ${c.malchance}
- **Âge** : ${c.age} ans

## Capacités
- **Expertises** : ${[...a.expertise, ...o.expertise].join(', ')}
- **Don** : ${c.don}
- **Handicap** : ${c.handicap}
${arch.sorts ? `- **Sorts** : ${arch.sorts.join(', ')}\n` : ''}

## Inventaire (${slotsUsed}/${c.invMax} — ${charge.niveau})
${items.map(i => `- ${i.txt} *(${i.slots} empl.)*`).join('\n')}
`;
}

document.getElementById('btn-roll').addEventListener('click', generate);

document.getElementById('btn-copy').addEventListener('click', () => {
  if (!currentChar) return;
  const md = toMarkdown(currentChar);
  navigator.clipboard.writeText(md).then(() => {
    const c = document.getElementById('copy-confirm');
    c.classList.add('show');
    setTimeout(() => c.classList.remove('show'), 1800);
  });
});

document.getElementById('btn-print').addEventListener('click', () => {
  if (!currentChar) return;
  window.print();
});

// Premier perso au chargement
generate();
</script>

</body>
</html>
